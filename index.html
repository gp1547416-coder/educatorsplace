<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducatorsPlace | Dev Hub</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            background-color: var(--dark);
        }
        /* Navigation Bar */
        nav {
            background: #0f172a;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 2px solid var(--primary);
        }
        nav button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        nav button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
        nav button:active {
            transform: translateY(0);
        }
        /* Iframe Container */
        .container {
            flex-grow: 1;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--light);
            text-align: center;
            z-index: -1;
        }
    </style>
</head>
<body>

    <nav>
        <button onclick="loadSite('https://replit.com/~')">Replit</button>
        <button onclick="loadSite('https://codepen.io/pen/')">CodePen</button>
        <button onclick="loadSite('https://jsfiddle.net/')">JSFiddle</button>
        <button onclick="loadSite('https://stackblitz.com/?view=editor')">StackBlitz</button>
        <button onclick="loadSite('https://codesandbox.io/s/')">CodeSandbox</button>
        <button onclick="loadSite('https://codeberg.org/')">Codeberg</button>
    </nav>

    <div class="container">
        <div class="placeholder">
            <h1>EducatorsPlace</h1>
            <p>Select a tool above to begin</p>
        </div>
        <iframe id="main-frame" src="" title="Content Window"></iframe>
    </div>

    <script>
        function loadSite(url) {
            document.getElementById('main-frame').src = url;
        }
    </script>

</body>
</html>
